##### 基础 #####

# Prefix（避免 Ctrl+b）
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# shell（自动检测）
set -g default-shell "$(which zsh)"

# 快速 reload
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# 启动编号从 1 开始
set -g base-index 1
setw -g pane-base-index 1

##### 终端 & 颜色 #####

# 推荐（比 screen-256color 更现代）
set -g default-terminal "tmux-256color"

# true color 支持（关键！）
set -ga terminal-overrides ",*:Tc"

##### 分屏（保持路径） #####

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

##### Vim 风格 #####

setw -g mode-keys vi

# copy-mode（更像 vim）
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi r send -X rectangle-toggle

##### 鼠标（现代正确姿势） #####

set -g mouse on

# 滚轮直接进入 copy-mode
bind -n WheelUpPane if-shell -F "#{mouse_any_flag}" \
  "send -M" \
  "copy-mode -e"

##### 剪贴板（跨平台完美方案） #####

# macOS（iTerm2 / 本机）
if-shell 'uname | grep -q Darwin' {
  bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
}

# Linux（需要 xclip）
if-shell 'uname | grep -q Linux' {
  bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
}

##### 状态栏 #####

set -g status-interval 5
set -g status-justify centre

# 左边
set -g status-left "#[fg=black,bg=green,bold] #S #[default]"

# 右边（时间 + 主机）
set -g status-right "#[fg=yellow]#H #[fg=cyan]%Y-%m-%d %H:%M"

# 当前窗口高亮
setw -g window-status-current-style "fg=black,bg=yellow,bold"

##### Pane 操作优化 #####

# 用 hjkl 切 pane（无 prefix）
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-j select-pane -D
bind -n M-k select-pane -U

# resize（更顺手）
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5

##### 插件（极简但实用） #####

set -g @plugin 'tmux-plugins/tpm'

# 自动保存会话
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# 更好的复制
set -g @plugin 'tmux-plugins/tmux-yank'

# 默认 sane 配置
set -g @plugin 'tmux-plugins/tmux-sensible'

# 自动恢复（开机）
set -g @continuum-restore 'on'

##### 启动 TPM #####

run '~/.tmux/plugins/tpm/tpm'