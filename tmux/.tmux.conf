# -----------------------------------------------------------------------------
# Modern tmux config
# 保持原主题风格不变，清理旧版/报错项
# 建议 tmux >= 3.2
# -----------------------------------------------------------------------------

# Prefix
set -g prefix C-z
unbind C-b

# 允许发送 prefix 给嵌套 tmux
bind C-z send-prefix

# shell
set -g default-shell /bin/zsh

# reload
bind r source-file ~/.tmux.conf \; display-message "Reloaded!"

# -----------------------------------------------------------------------------
# 基础行为
# -----------------------------------------------------------------------------

# 更现代的 TERM
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"

# 编号从 1 开始
set -g base-index 1
setw -g pane-base-index 1

# 保持窗口路径
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"

# 新 panel 打开 man
bind m command-prompt "split-window -h 'exec man %%'"

# 开关日志
bind P pipe-pane -o "cat >> ~/Desktop/#W.log" \; display-message "Toggled logging to ~/Desktop/#W.log"

# -----------------------------------------------------------------------------
# iTerm2 / 标题
# -----------------------------------------------------------------------------

set -g allow-rename on
set -g set-titles on
set -g set-titles-string "#T - #W"

# 仅在较新 tmux 可用；老版本可注释
set -g allow-passthrough on

# -----------------------------------------------------------------------------
# 剪贴板 / 鼠标
# -----------------------------------------------------------------------------

set -g set-clipboard on
setw -g mode-keys vi
set -g mouse on

# 鼠标滚轮进入 copy-mode
bind -n WheelUpPane if-shell -F "#{mouse_any_flag}" "send -M" "copy-mode -e"

# copy-mode-vi 复制
# macOS 用 pbcopy，Linux 用 xclip；两边都写，能用哪个就用哪个
if-shell 'command -v pbcopy >/dev/null 2>&1' \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'"

if-shell 'command -v xclip >/dev/null 2>&1' \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle

# -----------------------------------------------------------------------------
# 状态栏 —— 保持你原来的主题风格
# -----------------------------------------------------------------------------

set -g status-interval 1
set -g status-justify left
setw -g monitor-activity on

set -g status-left "#[bg=#FF661D] ❐ #S "
set -g status-left-length 300
set -g status-right-length 500

setw -g window-status-format " #I #W "
setw -g window-status-current-format " #I:#W#F "
setw -g window-status-separator ""
setw -g window-status-current-style "bg=red"
setw -g window-status-last-style "fg=red"

set -g message-style "bg=#202529,fg=#91A8BA"

# 这里合并了你原来两次 status-right，避免互相覆盖
set -g status-right '#{prefix_highlight} Continuum: #{continuum_status} #H | %a %Y-%m-%d %H:%M'

# -----------------------------------------------------------------------------
# Pane 操作增强
# -----------------------------------------------------------------------------

# Alt + hjkl 切 pane
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Prefix + Shift + HJKL 调整大小
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -----------------------------------------------------------------------------
# TPM / Plugins
# -----------------------------------------------------------------------------

setenv -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'soyuka/tmux-current-pane-hostname'

# better mouse mode 你原来在用；可保留
set -g @plugin 'nhdaly/tmux-better-mouse-mode'

set -g @shell_mode 'vi'

# resurrect
set -g @resurrect-dir '~/.tmux/resurrect'

# continuum
set -g @continuum-restore 'on'

# prefix-highlight
set -g @light_copy_mode_attr 'fg=white,bg=blue'

# tmux-yank
set -g @yank_selection 'clipboard'

# -----------------------------------------------------------------------------
# TPM
# -----------------------------------------------------------------------------

run '~/.tmux/plugins/tpm/tpm'