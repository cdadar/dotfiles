# -----------------------------------------------------------------------------
# Tmux 基本配置 - 要求 Tmux >= 2.3
# 如果不想使用插件，只需要将此节的内容写入 ~/.tmux.conf 即可
# -----------------------------------------------------------------------------
# C-b 和 VIM 冲突，修改 Prefix 组合键为 Control-Z，按键距离近
set -g prefix C-z
unbind C-b

# set Zsh as your default Tmux shell
set -g default-shell /bin/zsh

# Allow us to reload our Tmux configuration while
# using Tmux
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# 绑定m键为在新的panel打开man
bind m command-prompt "splitw -h 'exec man %%'"
# 绑定P键为开启日志功能，如下，面板的输出日志将存储到桌面
bind P pipe-pane -o "cat >>~/Desktop/#W.log" \; display "Toggled logging to ~/Desktop/#W.log"

# Default terminal - use screen-256color for better compatibility
set -g default-terminal "screen-256color"

# iTerm2 split pane compatibility
set -g allow-passthrough on
set -g allow-rename on
set -g set-titles on
set -g set-titles-string "#T - #W"

# Clipboard - platform specific
set -g set-clipboard on
set -g @yank_selection 'clipboard'

# Split pane bindings
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"

# -----------------------------------------------------------------------------
# iTerm2 tmux 鼠标操作配置
# -----------------------------------------------------------------------------
# 启用鼠标支持
set -g mouse on

# 鼠标模式配置 - 使用 iTerm2 风格的鼠标操作
# 启用鼠标拖拽选择文本
set -g mode-keys vi

# 鼠标操作配置
# 左键点击：选择并复制文本到剪贴板
# 右键点击：粘贴剪贴板内容
# 中键点击：粘贴选择的内容
# 鼠标滚轮：滚动历史记录

# 启用鼠标自动选择模式 - 点击即可选择并复制
set -g @selection_mode 'clipboard'

# 启用鼠标同步 - 在复制模式下鼠标操作会同步到系统剪贴板
set -g @yank_selection 'clipboard'

# 鼠标拖动选择后自动复制到剪贴板
set -g @yank_with_selection 'on'

# 启用鼠标支持时自动进入复制模式
set -g @scroll_with_mouse_on 'copy-mode'

# 鼠标操作快捷键配置
# 按住 Option 键 + 左键拖动：在 tmux 内部进行选择
# 按住 Command 键 + 左键点击：传递给 iTerm2 处理
# 鼠标滚轮滚动：默认在复制模式中滚动

# 复制模式中的鼠标配置
# 启用鼠标拖动选择
setw -g mode-mouse on
# 启用鼠标选择
setw -g mouse-select-pane on
# 启用鼠标选择窗口
setw -g mouse-select-window on
# 启用鼠标调整窗格大小

# 鼠标拖动调整窗格大小
setw -g mouse-resize-pane on

# 复制模式中的鼠标操作
# 使用鼠标左键拖动选择文本
# 使用鼠标滚轮滚动历史记录
# 双击选择整个单词
# 三击选择整行

# 复制完成后自动退出复制模式
set -g @copy_mode_exit_after_copy_mode 'on'

# 复制完成后自动复制到系统剪贴板
set -g @copy_mode_exit_copy_to_clipboard 'on'

# 启用鼠标自动复制
set -g @copy_mode_exit_use_paste 'off'

# 状态栏设置
set -g status-interval 1
set -g status-justify left
setw -g monitor-activity on

set -g status-left "#[bg=#FF661D] ❐ #S "
set -g status-right 'Continuum status: #{continuum_status}'
set -g status-left-length 300
set -g status-right-length 500

set -wg window-status-format " #I #W "
set -wg window-status-current-format " #I:#W#F "
set -wg window-status-separator ""
set -wg window-status-current-style "bg=red"
set -wg window-status-last-style "fg=red"

set -g message-style "bg=#202529, fg=#91A8BA"

# -----------------------------------------------------------------------------
# 使用插件 - via tpm
#   1. 执行 git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#   2. 执行 bash ~/.tmux/plugins/tpm/bin/install_plugins
# -----------------------------------------------------------------------------

setenv -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

# 推荐的插件
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @shell_mode 'vi'

set -g @plugin 'soyuka/tmux-current-pane-hostname'
set -g @plugin 'tmux-plugins/tpm'

# tmux-resurrect
set -g @resurrect-dir '~/.tmux/resurrect'
set -g @plugin 'tmux-plugins/tmux-logging'
# tmux-prefix-highlight
set -g status-right '#{prefix_highlight} #H | %a %Y-%m-%d %H:%M'
set -g @light_copy_mode_attr 'fg=white,bg=blue'

# 初始化 TPM 插件管理器
run '~/.tmux/plugins/tpm/tpm'

# -----------------------------------------------------------------------------
# 结束
# -----------------------------------------------------------------------------
